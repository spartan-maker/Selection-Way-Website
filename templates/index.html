<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="https://i.ibb.co/sd3PmWNp/Black-and-Gray-Tattoo-Studio-Business-Logo-1.png">
    <meta name="referrer" content="origin-when-cross-origin"> 
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Selection Way | Kunal">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0b1120">
    <link rel="apple-touch-icon" href="https://www.selectionway.com/next_images/logo.png">

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <title>Selection Way | Kunal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <div style="display: flex; align-items: center; gap: 12px;">
        <img src="https://i.ibb.co/sd3PmWNp/Black-and-Gray-Tattoo-Studio-Business-Logo-1.png" alt="Selection Way | Kunal" style="height: 35px; border-radius: 4px; object-fit: contain;">
        <div class="header-title" id="breadcrumb-container"></div>
    </div>
    <div class="header-actions">
        <button id="switch-platform-btn" onclick="switchPlatform()" style="display: none; background: #64748b; font-size: 0.8rem; padding: 6px 10px;">Switch Platform</button>
        <button id="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">☀️</button>
        <button id="back-btn" onclick="goBack()" style="display: none;">⬅ Back</button>
    </div>
</header>

<div id="content"></div>

<div id="modal" class="modal">
  <div class="modal-box" id="modalContent"></div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
