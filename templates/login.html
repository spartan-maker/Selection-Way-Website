<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Selection Way</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; 
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-box { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3rem 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; 
        }

        .logo-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .login-box h2 { 
            margin-top: 0; 
            margin-bottom: 2rem; 
            color: #ffffff; 
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .input-group {
            margin-bottom: 1.2rem;
            position: relative;
        }

        input { 
            width: 100%; 
            padding: 0.9rem 1rem; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 8px; 
            background: rgba(15, 23, 42, 0.6); 
            color: white; 
            font-size: 1rem;
            box-sizing: border-box; 
            transition: all 0.2s ease;
        }

        input::placeholder { color: #64748b; }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.9);
        }

        button { 
            width: 100%; 
            padding: 0.9rem; 
            margin-top: 0.5rem;
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.05rem;
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        button:hover { 
            background: var(--primary-hover); 
            transform: translateY(-1px);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        #error-msg { 
            color: #ef4444; 
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem; 
            margin-bottom: 1.5rem; 
            display: none; 
        }

        .contact-admin {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .contact-admin a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .contact-admin a:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-box">
            <img src="https://www.selectionway.com/next_images/logo.png" alt="Logo" class="logo-img">
            <h2>Welcome Back</h2>
            <div id="error-msg"></div>
            
            <form id="login-form">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" required autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit">Log In</button>
            </form>

            <div class="contact-admin">
                Need credentials? <br>
                <a href="https://t.me/got_nirvana" target="_blank">Contact Admin on Telegram</a>
            </div>
        </div>
    </div>

    <script>
        function getDeviceId() {
            let deviceId = localStorage.getItem("sw_device_id");
            if (!deviceId) {
                deviceId = crypto.randomUUID ? crypto.randomUUID() : 'dev-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem("sw_device_id", deviceId);
            }
            return deviceId;
        }

        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector("button");
            const errorDiv = document.getElementById("error-msg");
            
            btn.innerText = "Authenticating..."; 
            btn.disabled = true; 
            errorDiv.style.display = "none";

            const payload = {
                username: document.getElementById("username").value.trim(),
                password: document.getElementById("password").value,
                device_id: getDeviceId()
            };

            try {
                const res = await fetch("/login", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (res.ok) { 
                    window.location.href = data.redirect; 
                } else { 
                    errorDiv.innerText = data.error; 
                    errorDiv.style.display = "block"; 
                }
            } catch (err) {
                errorDiv.innerText = "Network error. Please try again."; 
                errorDiv.style.display = "block";
            } finally {
                btn.innerText = "Log In"; 
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
